<div class="auth-page">
  <div class="auth-brand">
    <img src="logo.png" alt="FinanSys" class="brand-logo-img" />
    <p class="brand-tagline">Controle financeiro simples e eficiente</p>
  </div>

  <div class="auth-card">
    <div class="auth-card-header">
      <h2>Criar conta</h2>
      <p>Preencha os dados para se cadastrar</p>
    </div>

    <form class="auth-form" (ngSubmit)="submit()">
      @if (errorMsg) {
        <div class="alert alert-danger">{{ errorMsg }}</div>
      }

      <div class="input-group">
        <label for="name">Nome completo</label>
        <input type="text" id="name" placeholder="Seu nome" [(ngModel)]="name" name="name" />
      </div>

      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" [(ngModel)]="email" name="email" />
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" id="password" placeholder="Mínimo 6 caracteres" [(ngModel)]="password" name="password" />
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
            @if (showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirmar senha</label>
        <div class="password-wrapper">
          <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword" placeholder="Repita a senha" [(ngModel)]="confirmPassword" name="confirmPassword" />
          <button type="button" class="toggle-password" (click)="showConfirmPassword = !showConfirmPassword" [attr.aria-label]="showConfirmPassword ? 'Ocultar senha' : 'Mostrar senha'">
            @if (showConfirmPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-full">Cadastrar</button>
    </form>

    <div class="auth-footer">
      <p>Já tem uma conta? <a routerLink="/login">Faça login</a></p>
    </div>
  </div>
</div>
