<div class="auth-page">
  <div class="auth-brand">
    <img src="logo.png" alt="FinanSys" class="brand-logo-img" />
    <p class="brand-tagline">Controle financeiro simples e eficiente</p>
  </div>

  <div class="auth-card">
    <div class="auth-card-header">
      <h2>Acesse sua conta</h2>
      <p>Entre com seus dados para continuar</p>
    </div>

    <form class="auth-form" (ngSubmit)="submit()">
      @if (errorMsg) {
        <div class="alert alert-danger">{{ errorMsg }}</div>
      }

      <div class="input-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          placeholder="seu@email.com"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
        />
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          placeholder="Sua senha"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-full">Entrar</button>
    </form>

    <div class="auth-footer">
      <p>Não tem uma conta? <a routerLink="/register">Cadastre-se aqui</a></p>
    </div>

    <div class="mock-hint">
      <span>Demo: qualquer e-mail e senha funcionam</span>
    </div>
  </div>
</div>
